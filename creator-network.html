const _imdbCache       = new Map(); // tt → data
const _imdbTtCache     = new Map(); // workTitle → tt | 'NOT_FOUND'
const _translateCache  = new Map(); // 原文 → 訳文

async function translatePlot(text) {
  if (!text) return text;
  if (_translateCache.has(text)) return _translateCache.get(text);
  try {
    const r = await fetch('/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const d = await r.json();
    if (d.translated) { _translateCache.set(text, d.translated); return d.translated; }
  } catch (e) { console.warn('[DeepL]', e); }
  return text; // 失敗時は原文を返す
}

function categoryLabel(cat) {
  const map = {
    director: '監督', writer: '脚本', producer: 'プロデューサー',
    composer: '音楽', cinematographer: '撮影', editor: '編集',
    production_designer: 'プロダクションデザイン',
    casting_director: 'キャスティング',
    costume_designer: '衣装',
    self: '本人出演', archive_footage: 'アーカイブ映像',
    archive_sound: 'アーカイブ音声',
  };
  return map[cat] || cat;
}

function imdbProxyImg(url) {
  if (!url) return null;
  return `/imdb-img/${btoa(url)}`;
}

function personImgHtml(imgUrl, phIcon, imgClass, phClass) {
  if (imgUrl) {
    return `<img class="${esc(imgClass)}" src="${esc(imdbProxyImg(imgUrl))}" alt="" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="${esc(phClass)}" style="display:none">${phIcon}</div>`;
  }
  return `<div class="${esc(phClass)}">${phIcon}</div>`;
}

function renderImdbData(panelId, data) {
  const body    = document.getElementById(`imdb-body-${panelId}`);
  const foundEl = document.getElementById(`imdb-found-${panelId}`);
  if (!body) return;

  if (data.notFound) {
    body.innerHTML = `<div class="imdb-not-found">IMDbに情報が見つかりませんでした</div>`;
    return;
  }

  // ── ヘッダー: タイトル・年・評価 ──────────────────────────────────
  if (foundEl) {
    let chips = '';
    if (data.rating) chips += `<span class="imdb-chip rating">★ ${data.rating}</span>`;
    if (data.votes)  chips += `<span class="imdb-chip">${Number(data.votes).toLocaleString('ja-JP')} votes</span>`;
    if (data.year)   chips += `<span class="imdb-chip">${data.year}</span>`;
    foundEl.innerHTML = `
      <div style="padding:4px 0 10px;display:flex;flex-wrap:wrap;align-items:center;gap:6px">
        <span class="imdb-badge">IMDb</span>
        <span style="font-size:13px;font-weight:600;color:var(--text)">${esc(data.title || '')}</span>
        ${chips}
      </div>`;
  }

  const directors = data.directors || [];
  const cast      = data.cast      || [];
  const crew      = data.crew      || [];
  const writers   = data.writers   || [];

  // クルー重複排除（writersがcrewに含まれる場合）
  const crewNames = new Set(crew.map(p => p.name));
  const allCrew   = [
    ...directors.map(p => ({ ...p, category: 'director' })),
    ...writers.map(p => ({ ...p, category: 'writer' })).filter(p => !crewNames.has(p.name)),
    ...crew,
  ];

  let html = '';

  // ── 基本情報: ジャンル・上映時間・あらすじ ───────────────────────────
  const infoChips = [];
  if (data.runtime) infoChips.push(`<span class="imdb-chip runtime">${data.runtime}分</span>`);
  (data.genres || []).forEach(g => infoChips.push(`<span class="imdb-chip">${esc(g)}</span>`));
  if (infoChips.length || data.plot) {
    html += `<div class="imdb-meta-row">`;
    if (infoChips.length) html += `<div class="imdb-info-grid">${infoChips.join('')}</div>`;
    if (data.plot) html += `<div class="imdb-plot">${esc(data.plot)}</div>`;
    html += `</div>`;
  }

  // work-person-btn と同じカードUI（横スクロール）、クリックでGoogle検索
  // onclick は data-name 属性経由で安全に渡す（JSON.stringify を HTML属性に直書きするとSyntaxError）
  const imdbPersonCard = (name, role, imgSrc, accentColor) => {
    const initial  = [...name][0] || '?';
    const showRole = role && role.trim() && role.trim().toLowerCase() !== name.trim().toLowerCase();
    const avatarInner = imgSrc
      ? `<img src="${esc(imgSrc)}" alt="" style="width:100%;height:100%;object-fit:cover"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff">${esc(initial)}</span>`
      : `<span style="display:flex;width:100%;height:100%;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff">${esc(initial)}</span>`;
    return `
      <button class="imdb-search-card" data-name="${esc(name)}"
        style="display:inline-flex;flex-direction:row;align-items:center;gap:10px;
               width:fit-content;max-width:200px;flex-shrink:0;
               background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--r);
               padding:10px 12px;cursor:pointer;text-align:left;transition:all .15s;font-family:var(--sans)"
        onmouseover="this.style.borderColor='var(--accent)';this.style.background='var(--bg2)'"
        onmouseout="this.style.borderColor='var(--card-border)';this.style.background='var(--card-bg)'">
        <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;
                    background:${accentColor};overflow:hidden;
                    display:flex;align-items:center;justify-content:center">
          ${avatarInner}
        </div>
        <div style="min-width:0;overflow:hidden">
          <div style="font-size:11px;font-weight:700;color:var(--text);
                      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                      line-height:1.4;margin-bottom:2px">${esc(name)}</div>
          ${showRole ? `<div style="font-size:10px;font-weight:500;color:var(--text-2);
                      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                      line-height:1.3">${esc(role)}</div>` : ''}
        </div>
      </button>`;
  };


  // role の優先度順（数値が小さいほど先）
  const ROLE_ORDER = ['director','writer','producer','composer','cinematographer','editor','production_designer','casting_director','costume_designer'];
  function roleRank(cat) {
    const i = ROLE_ORDER.indexOf(cat);
    return i === -1 ? ROLE_ORDER.length : i;
  }

  // ── クリエイター（監督・スタッフ）ロールごとにセクション分け ────────────
  if (allCrew.length) {
    // ロールごとにグループ化（優先度順を保持）
    const roleGroups = new Map();
    [...allCrew]
      .sort((a, b) => roleRank(a.category) - roleRank(b.category))
      .forEach(p => {
        const key = p.category || '';
        if (!roleGroups.has(key)) roleGroups.set(key, []);
        roleGroups.get(key).push(p);
      });

    // 各グループ内: アイコンあり & creatorMetaに登録=0, アイコンあり=1, creatorMetaに登録=2, 残り=3 → 名前順
    roleGroups.forEach(persons => {
      persons.sort((a, b) => {
        function crewScore(p) {
          const hasImg = !!(p.image);
          const inMeta = creatorMetaMap.has(p.name || '');
          if (hasImg && inMeta) return 0;
          if (hasImg)           return 1;
          if (inMeta)           return 2;
          return 3;
        }
        const sa = crewScore(a), sb = crewScore(b);
        if (sa !== sb) return sa - sb;
        return (a.name || '').localeCompare(b.name || '', 'ja');
      });
    });

    html += `<div class="imdb-sub-title">クリエイター (${allCrew.length}人)</div>`;
    html += `<div style="display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:10px">`;
    roleGroups.forEach((persons, cat) => {
      persons.forEach(p => {
        const name   = p.name || '';
        const role   = p.job  ? p.job : categoryLabel(p.category);
        const imgSrc = p.image ? imdbProxyImg(p.image) : '';
        html += imdbPersonCard(name, role, imgSrc, 'var(--node-dir)');
      });
    });
    html += `</div>`;
  }

  // ── 出演者 ───────────────────────────────────────────────────────────
  if (cast.length) {
    const castLimit = 30;
    // アイコンあり & 名前=characters[0]=0, アイコンあり=1, 名前=characters[0]=2, 残りはcharacters毎に名前順
    const sortedCast = [...cast].sort((a, b) => {
      function castScore(p) {
        const hasImg      = !!(p.image);
        const nameMatchCh = !!(p.characters && p.characters.length && p.name && p.name === p.characters[0]);
        if (hasImg && nameMatchCh) return 0;
        if (hasImg)                return 1;
        if (nameMatchCh)           return 2;
        return 3;
      }
      const sa = castScore(a), sb = castScore(b);
      if (sa !== sb) return sa - sb;
      // スコア3同士はcharacters[0]毎にまとめてから名前順
      if (sa === 3) {
        const ca = (a.characters && a.characters[0]) || '', cb = (b.characters && b.characters[0]) || '';
        if (ca !== cb) return ca.localeCompare(cb, 'ja');
      }
      return (a.name || '').localeCompare(b.name || '', 'ja');
    });
    html += `<div class="imdb-sub-title">出演 (${cast.length}人)</div>`;
    html += `<div style="display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:10px">`;
    sortedCast.slice(0, castLimit).forEach(p => {
      const name   = p.name || '';
      const role   = (p.characters && p.characters.length) ? p.characters[0] : categoryLabel(p.category) || '';
      const imgSrc = p.image ? imdbProxyImg(p.image) : '';
      html += imdbPersonCard(name, role, imgSrc, 'var(--node-art)');
    });
    html += `</div>`;
    if (cast.length > castLimit) {
      html += `<div style="font-size:11px;color:var(--text-dim);padding-bottom:4px">他 ${cast.length - castLimit} 人</div>`;
    }
  }

  if (!html) html = `<div class="imdb-not-found">データなし</div>`;
  body.innerHTML = html;

  // カードクリック → フィルモグラフィー表示（IMDb nameId を検索）
  body.querySelectorAll('.imdb-search-card').forEach(btn => {
    btn.addEventListener('click', () => {
      const name = btn.dataset.name;
      const imgSrc = btn.querySelector('img')?.src || '';
      if (name) openFilmographyModal(name, imgSrc);
    });
  });
}

async function fetchImdbInfo(panelId, workTitle) {
  const body    = document.getElementById(`imdb-body-${panelId}`);
  const foundEl = document.getElementById(`imdb-found-${panelId}`);
  if (!body) return;

  try {
    // ── 1) tt 取得 ────────────────────────────────────────────────
    let tt = _imdbTtCache.get(workTitle);

    if (!tt) {
      const r1 = await fetch('/imdb-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: workTitle }),
      });
      if (!r1.ok) throw new Error(`検索失敗 (${r1.status})`);
      const d1 = await r1.json();

      if (d1.error) throw new Error(d1.error);

      if (d1.notFound) {
        _imdbTtCache.set(workTitle, 'NOT_FOUND');
        renderImdbData(panelId, { notFound: true });
        return;
      }

      tt = d1.tt;
      _imdbTtCache.set(workTitle, tt);
      if (foundEl) foundEl.textContent = d1.title || '';
    }

    if (tt === 'NOT_FOUND') {
      renderImdbData(panelId, { notFound: true });
      return;
    }

    // ── 2) キャッシュ確認 ─────────────────────────────────────────
    if (_imdbCache.has(tt)) {
      renderImdbData(panelId, _imdbCache.get(tt));
      return;
    }

    // ── 3) キャスト・クルー取得（サーバー経由で api.imdbapi.dev を叩く）────
    const r2 = await fetch('/imdb-crew', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tt }),
    });
    if (!r2.ok) throw new Error(`クルー取得失敗 (${r2.status})`);
    const d2 = await r2.json();
    if (d2.error) throw new Error(d2.error);

    // plot を日本語に翻訳してからキャッシュ・描画
    const plotJa = d2.plot ? await translatePlot(d2.plot) : d2.plot;
    const d2ja = { ...d2, tt, plot: plotJa };
    _imdbCache.set(tt, d2ja);
    renderImdbData(panelId, d2ja);

  } catch (e) {
    console.error('[IMDB]', e);
    if (body) {
      body.innerHTML = `<div class="imdb-error">
        <span style="font-weight:600">取得エラー:</span> ${esc(e.message)}
      </div>`;
    }
  }
}

/* ═══════════════════════════════════════════
   FILMOGRAPHY MODAL
═══════════════════════════════════════════ */
const _fmgNameIdCache = new Map();  // name → nameId
const _fmgDataCache   = new Map();  // nameId → filmography data
const _fmgYoutubeCache = new Map(); // title → YouTube video data | null

// カテゴリ種別ラベル
function fmgTypeLabel(titleType) {
  const map = {
    musicVideo: 'Music Video', movie: '映画', tvSeries: 'TVシリーズ',
    tvMiniSeries: 'TVミニシリーズ', tvMovie: 'TV映画', short: '短編',
    video: 'ビデオ', tvSpecial: 'TVスペシャル', tvShort: 'TV短編',
    videoGame: 'ゲーム', podcastSeries: 'ポッドキャスト',
  };
  return map[titleType] || titleType || '不明';
}

// フィルモグラフィーのカテゴリタブ一覧（優先順）
const FMG_TAB_ORDER = ['musicVideo', 'movie', 'tvSeries', 'tvMiniSeries', 'tvMovie', 'short', 'video', 'tvSpecial'];

let _fmgCurrentTab  = null;
let _fmgCurrentName = null;
let _fmgGroups      = {};

function fmgTitleObject(item) {
  return item?.title && typeof item.title === 'object' ? item.title : {};
}

function fmgTitleType(item) {
  const title = fmgTitleObject(item);
  return item?.titleType ?? item?.type ?? title.titleType ?? title.type ?? item?.kind ?? 'unknown';
}

function fmgCreditTitle(item) {
  const title = fmgTitleObject(item);
  if (typeof item?.title === 'string') return item.title;
  return title.primaryTitle ?? title.originalTitle ?? item?.primaryTitle ?? item?.l ?? item?.titleId ?? item?.id ?? '不明';
}

function fmgTitleId(item) {
  const title = fmgTitleObject(item);
  return item?.tconst ?? item?.titleId ?? title.id ?? item?.id ?? '';
}

function fmgRawRoleValues(item) {
  const values = [];
  const push = (value) => {
    if (!value) return;
    if (typeof value === 'string') values.push(value);
    else if (typeof value === 'object') values.push(value.job ?? value.category ?? value.name ?? value.text ?? '');
  };
  push(item?.category);
  push(item?.job);
  (Array.isArray(item?.jobs) ? item.jobs : []).forEach(push);
  (Array.isArray(item?.roles) ? item.roles : []).forEach(push);
  if (!values.length) (Array.isArray(item?.characters) ? item.characters : []).forEach(push);
  return values.filter(Boolean);
}

function fmgRoleLabel(role) {
  const map = {
    director: '監督', writer: '脚本', producer: 'プロデューサー',
    composer: '音楽', cinematographer: '撮影', editor: '編集',
    production_designer: 'プロダクションデザイン',
    actor: '出演', actress: '出演', self: '本人出演',
  };
  return map[role] || role;
}

function mergeFilmographyItems(items) {
  const merged = new Map();
  items.forEach(item => {
    const key = fmgTitleId(item) || `${fmgCreditTitle(item)}|${item.year ?? item.startYear ?? fmgTitleObject(item).startYear ?? ''}`;
    const existing = merged.get(key);
    if (!existing) {
      merged.set(key, { ...item, _fmgRoles: fmgRawRoleValues(item) });
      return;
    }

    existing._fmgRoles = [...(existing._fmgRoles || []), ...fmgRawRoleValues(item)];
    const existingTitle = fmgTitleObject(existing);
    const title = fmgTitleObject(item);
    if (!existingTitle.primaryImage?.url && title.primaryImage?.url) existing.title = item.title;
    if (!existing.primaryImage?.url && item.primaryImage?.url) existing.primaryImage = item.primaryImage;
    if (!existing.rating && item.rating) existing.rating = item.rating;
  });

  return [...merged.values()].map(item => ({
    ...item,
    _fmgRoles: [...new Set((item._fmgRoles || []).map(fmgRoleLabel))],
  }));
}

function normalizeFilmographyCredits(fmgData) {
  const source = fmgData?.filmography ?? fmgData?.credits ?? (Array.isArray(fmgData) ? fmgData : []);
  const credits = Array.isArray(source)
    ? source
    : source && typeof source === 'object'
      ? Object.values(source).flat()
      : [];

  return credits.filter(item => item && typeof item === 'object');
}

async function enrichFmgYoutubeLinks(body) {
  const rows = [...body.querySelectorAll('.fmg-item[data-yt-title]')];

  const updateRow = (row) => {
    const title = row.dataset.ytTitle;
    const result = _fmgYoutubeCache.get(title);
    const thumbSlot = row.querySelector('.fmg-thumb, .fmg-ph');

    // 結果なし（取得失敗 or 見つからなかった）→ スケルトン解除だけ
    if (!result?.url) {
      if (thumbSlot?.classList.contains('fmg-ph')) thumbSlot.classList.add('done');
      return;
    }

    row.href = result.url;

    if (!result.thumbnail || !thumbSlot || thumbSlot.classList.contains('loaded')) {
      if (thumbSlot?.classList.contains('fmg-ph')) thumbSlot.classList.add('done');
      return;
    }

    const img = document.createElement('img');
    img.className = 'fmg-thumb';
    img.alt = '';
    img.loading = 'lazy';
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => {
      const ph = document.createElement('div');
      ph.className = 'fmg-ph done';
      img.replaceWith(ph);
    };
    img.src = result.thumbnail;
    thumbSlot.replaceWith(img);
  };

  // 1. すでにキャッシュにあるものは即座に反映
  rows.forEach(updateRow);

  // 2. キャッシュにないタイトルを抽出
  const titlesToFetch = [...new Set(rows.map(row => row.dataset.ytTitle).filter(Boolean))]
    .filter(title => !_fmgYoutubeCache.has(title));

  if (!titlesToFetch.length) return;

  // 3. BATCH_SIZE=5 で細かく分割し、全チャンクを同時並列で投げる
  //    → yt-dlpが1プロセスで処理する件数を減らすことで1バッチの完了が早くなり、
  //      取得できたものからすぐ表示できる。awaitしないので全バッチが同時に走る。
  const BATCH_SIZE = 5;
  for (let i = 0; i < titlesToFetch.length; i += BATCH_SIZE) {
    const chunk = titlesToFetch.slice(i, i + BATCH_SIZE);
    fetch('/youtube-video-search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ titles: chunk }),
    })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      // 取得できなかったタイトルはnullとしてキャッシュしスケルトン解除
      chunk.forEach(title => {
        if (!_fmgYoutubeCache.has(title)) _fmgYoutubeCache.set(title, null);
      });
      if (data?.results) {
        Object.entries(data.results).forEach(([title, result]) => {
          _fmgYoutubeCache.set(title, result || null);
        });
      }
      // このチャンクに関連する行をまとめて更新
      chunk.forEach(title => {
        rows.filter(r => r.dataset.ytTitle === title).forEach(updateRow);
      });
    })
    .catch(err => {
      console.warn('[YouTube Batch Error]', err);
      chunk.forEach(title => {
        _fmgYoutubeCache.set(title, null);
        rows.filter(r => r.dataset.ytTitle === title).forEach(updateRow);
      });
    });
  }
}

async function openFilmographyModal(personName, avatarSrc) {
  _fmgCurrentName = personName;

  // モーダルを開く
  const overlay = document.getElementById('filmography-overlay');
  overlay.classList.add('visible');

  // ヘッダー設定
  const initial = [...personName][0] || '?';
  const avatarEl = document.getElementById('fm2-avatar');
  avatarEl.style.background = 'var(--node-dir)';
  if (avatarSrc && !avatarSrc.endsWith('/imdb-img/')) {
    avatarEl.innerHTML = `<img src="${esc(avatarSrc)}" alt="" onerror="this.parentElement.innerHTML='${esc(initial)}'">`;
  } else {
    avatarEl.textContent = initial;
  }
  document.getElementById('fm2-name').textContent = personName;
  document.getElementById('fm2-sub').textContent = 'IMDb フィルモグラフィーを読み込み中…';
  document.getElementById('fm2-google').onclick = () => {
    window.open(`https://www.google.com/search?q=${encodeURIComponent(personName)}`, '_blank', 'noopener');
  };
  document.getElementById('fm2-tabs').innerHTML = '';
  document.getElementById('fm2-body').innerHTML = `
    <div class="fm2-loading">
      <div class="fm2-spinner"></div>フィルモグラフィー取得中…
    </div>`;

  try {
    // nameId 取得
    let nameId = _fmgNameIdCache.get(personName);
    if (!nameId) {
      const r1 = await fetch('/imdb-name-search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: personName }),
      });
      if (!r1.ok) throw new Error(`nameId取得失敗 (${r1.status})`);
      const d1 = await r1.json();
      if (d1.notFound || !d1.nameId) {
        document.getElementById('fm2-sub').textContent = 'IMDbに情報が見つかりませんでした';
        document.getElementById('fm2-body').innerHTML = `<div class="fm2-empty">IMDbにこの人物の情報が見つかりませんでした。<br><br><a href="https://www.imdb.com/find?q=${encodeURIComponent(personName)}" target="_blank" style="color:var(--accent)">IMDbで手動検索する →</a></div>`;
        return;
      }
      nameId = d1.nameId;
      _fmgNameIdCache.set(personName, nameId);
      // アバター画像を IMDB画像で更新
      if (d1.image) {
        avatarEl.innerHTML = `<img src="/imdb-img/${btoa(d1.image)}" alt="" onerror="this.parentElement.textContent='${esc(initial)}'">`;
      }
    }

    // フィルモグラフィー取得
    let fmgData = _fmgDataCache.get(nameId);
    if (!fmgData) {
      const r2 = await fetch('/imdb-filmography', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nameId }),
      });
      if (!r2.ok) throw new Error(`フィルモグラフィー取得失敗 (${r2.status})`);
      fmgData = await r2.json();
      if (fmgData.error) throw new Error(fmgData.error);
      _fmgDataCache.set(nameId, fmgData);
    }

    // データを種別ごとにグループ化
    // api.imdbapi.devのフィルモグラフィーレスポンス形式に対応
    _fmgGroups = {};
    const creditArray = normalizeFilmographyCredits(fmgData);

    creditArray.forEach(item => {
      const type = fmgTitleType(item);
      if (!_fmgGroups[type]) _fmgGroups[type] = [];
      _fmgGroups[type].push(item);
    });

    // 各グループを年降順にソート
    Object.values(_fmgGroups).forEach(arr => {
      arr.sort((a, b) => {
        const titleA = fmgTitleObject(a);
        const titleB = fmgTitleObject(b);
        const ya = a.year ?? a.startYear ?? titleA.startYear ?? 0;
        const yb = b.year ?? b.startYear ?? titleB.startYear ?? 0;
        return yb - ya;
      });
    });

    const availableTypes = FMG_TAB_ORDER.filter(t => _fmgGroups[t]?.length)
      .concat(Object.keys(_fmgGroups).filter(t => !FMG_TAB_ORDER.includes(t) && _fmgGroups[t]?.length));

    if (!availableTypes.length) {
      document.getElementById('fm2-sub').textContent = '合計 0 件';
      document.getElementById('fm2-body').innerHTML = `<div class="fm2-empty">フィルモグラフィー情報が見つかりませんでした。</div>`;
      return;
    }

    // タブ生成
    const tabsEl = document.getElementById('fm2-tabs');
    tabsEl.innerHTML = '';
    availableTypes.forEach((type, i) => {
      const count = mergeFilmographyItems(_fmgGroups[type] || []).length;
      const btn = document.createElement('button');
      btn.className = 'fm2-tab' + (i === 0 ? ' active' : '');
      btn.textContent = `${fmgTypeLabel(type)} (${count})`;
      btn.dataset.type = type;
      btn.addEventListener('click', () => {
        tabsEl.querySelectorAll('.fm2-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _fmgCurrentTab = type;
        renderFmgList(type);
      });
      tabsEl.appendChild(btn);
    });

    _fmgCurrentTab = availableTypes[0];
    const totalWorks = availableTypes.reduce((sum, type) => sum + mergeFilmographyItems(_fmgGroups[type] || []).length, 0);
    document.getElementById('fm2-sub').textContent = `合計 ${totalWorks} 件`;
    renderFmgList(_fmgCurrentTab);

  } catch (e) {
    console.error('[Filmography]', e);
    document.getElementById('fm2-sub').textContent = 'エラーが発生しました';
    document.getElementById('fm2-body').innerHTML = `
      <div class="fm2-error">取得エラー: ${esc(e.message)}</div>
      <div style="padding:12px 20px">
        <a href="https://www.imdb.com/find?q=${encodeURIComponent(personName)}" target="_blank"
           style="color:var(--accent);font-size:13px">IMDbで手動検索する →</a>
      </div>`;
  }
}

function renderFmgList(type) {
  const body = document.getElementById('fm2-body');
  const items = mergeFilmographyItems(_fmgGroups[type] || []);
  if (!items.length) {
    body.innerHTML = `<div class="fm2-empty">この種別の作品はありません</div>`;
    return;
  }

  const html = items.map(item => {
    const titleObj = fmgTitleObject(item);
    const title   = fmgCreditTitle(item);
    const year    = item.year ?? item.startYear ?? titleObj.startYear ?? '';
    const rating  = item.rating?.aggregateRating ?? titleObj.rating?.aggregateRating ?? null;
    const imgUrl  = titleObj.primaryImage?.url ?? item.primaryImage?.url ?? item.image ?? '';
    const youtubeUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(title)}`;
    const titleType = fmgTitleType(item);

    const thumbHtml = '<div class="fmg-ph"></div>';

    const roleLabels = item._fmgRoles || [];
    const roleHtml = roleLabels.map(role => `<span class="fmg-role">${esc(role)}</span>`).join('');

    return `<a class="fmg-item" href="${esc(youtubeUrl)}" target="_blank" rel="noopener" data-yt-title="${esc(title)}">
      ${thumbHtml}
      <div class="fmg-info">
        <div class="fmg-title">${esc(title)}</div>
        <div class="fmg-meta">
          ${year ? `<span class="fmg-year">${esc(String(year))}</span>` : ''}
          ${roleHtml}
          ${titleType && titleType !== type ? `<span class="fmg-type">${esc(fmgTypeLabel(titleType))}</span>` : ''}
          ${rating ? `<span class="fmg-rating">★ ${rating}</span>` : ''}
        </div>
      </div>
    </a>`;
  }).join('');

  body.innerHTML = html;
  enrichFmgYoutubeLinks(body);
}

function closeFilmographyModal() {
  document.getElementById('filmography-overlay').classList.remove('visible');
  _fmgCurrentName = null;
}

document.getElementById('fm2-close').addEventListener('click', closeFilmographyModal);
document.getElementById('filmography-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('filmography-overlay')) closeFilmographyModal();
});

/* ═══════════════════════════════════════════
   ARTIST AVATAR (Deezer)
   フロー:
     1. アーティスト名 → サーバー /avatar へ POST
        → Deezer Search API でアーティスト検索
        → { imageUrl, artistName } を返す
     2. /avatar-img/<base64(imageUrl)> でプロキシ取得
     3. cache[artistName] = proxyUrl で保存
     4. node.avatar にセット → DOM反映
═══════════════════════════════════════════ */

// ── キャッシュ構造 ──────────────────────────────────────────────────────────
// localStorage に保存するオブジェクト:
//   { artistName → proxyUrl }

const AVATAR_CACHE_KEY = 'creator_avatar_deezer_v1';

function loadAvatarCache() {
  try {
    return JSON.parse(localStorage.getItem(AVATAR_CACHE_KEY) || '{}');
  } catch { return {}; }
}

function saveAvatarCache(cache) {
  try { localStorage.setItem(AVATAR_CACHE_KEY, JSON.stringify(cache)); } catch {}
}

// DOM のアバター欄を画像にフェードインで差し替える
function applyAvatarToDOM(node) {
  const cardEl = document.querySelector(`.pnode-card[data-id="${node.id}"]`);
  if (!cardEl) return;
  const avatarDiv = cardEl.querySelector('.pnode-avatar');
  if (!avatarDiv) return;
  const initial = [...node.label][0] || '?';
  const isDir = node.type === 'director';
  const nodeBg = isDir ? 'var(--node-dir)' : 'var(--node-art)';

  const img = document.createElement('img');
  img.className = 'avatar-img';  // opacity:0 からスタート
  img.src = node.avatar;
  img.alt = '';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover';

  img.onload = () => {
    // イニシャル span を除去してから画像をフェードイン
    avatarDiv.querySelectorAll('.pnode-initial').forEach(el => el.remove());
    avatarDiv.appendChild(img);
    requestAnimationFrame(() => img.classList.add('loaded'));
  };
  img.onerror = () => {
    // 失敗時: 青背景＋イニシャルをそのまま維持
    console.warn(`[Avatar] ${node.label}: 画像ロード失敗`, node.avatar);
    avatarDiv.style.background = nodeBg;
    if (!avatarDiv.querySelector('.pnode-initial')) {
      const span = document.createElement('span');
      span.className = 'pnode-initial';
      span.textContent = initial;
      avatarDiv.appendChild(span);
    }
  };
  // DOM に入れずに先読みスタート（onload/onerror が発火したら上記で処理）
  img.src = node.avatar;

  // パネルが同じノードを表示中なら ph-avatar も更新
  if (selId === node.id) {
    const phAvatar = document.getElementById('ph-avatar');
    if (phAvatar && phAvatar.style.display !== 'none') {
      phAvatar.innerHTML = '';
      const pImg = document.createElement('img');
      pImg.src = node.avatar; pImg.alt = '';
      pImg.style.cssText = 'width:100%;height:100%;object-fit:cover';
      pImg.onerror = () => {
        phAvatar.style.background = nodeBg;
        phAvatar.innerHTML = `<span class="pnode-initial">${initial}</span>`;
      };
      phAvatar.appendChild(pImg);
    }
  }
}


// ── Intersection Observer ベースの遅延アバター取得 ─────────────────────────
// 画面内に入ったノードカードを検出し、未取得のアーティストのみ順次フェッチする

let _avatarObserver = null;          // 現在の IntersectionObserver
const _avatarFetching = new Set();   // 処理中のノードID（重複防止）
const _avatarFetchQueue = [];        // 可視になった順の待機キュー
let _avatarQueueTimer = null;        // キュー処理タイマー

// アバター取得前はイニシャル表示をそのまま維持（青背景はノード生成時に設定済み）
function applyAvatarLoading(_node) { /* no-op */ }

// キューに溜まったノードを一定間隔でバッチ処理
async function _processAvatarQueue() {
  _avatarQueueTimer = null;
  if (!_avatarFetchQueue.length) return;

  const cache = loadAvatarCache();

  // キューを取り出す（最大20件ずつ）
  const batch = _avatarFetchQueue.splice(0, 20);
  const toFetch = [];

  for (const node of batch) {
    if (_avatarFetching.has(node.id)) continue;
    if (node.avatar) continue;  // 既に取得済み

    // キャッシュヒット → 即反映
    if (cache[node.label]) {
      node.avatar = cache[node.label];
      console.log(`[Avatar] ${node.label}: キャッシュヒット`);
      applyAvatarToDOM(node);
    } else {
      toFetch.push(node);
      _avatarFetching.add(node.id);
    }
  }

  if (!toFetch.length) {
    // まだキューが残っている場合は次を処理
    if (_avatarFetchQueue.length) _scheduleAvatarQueue();
    return;
  }

  console.log(`[Avatar] ${toFetch.length}件を取得中...`, toFetch.map(n => n.label));

  const artists = toFetch.map(node => ({
    artistName: node.label,
    workTitles: (node.works || []).map(wid => AN.find(n => n.id === wid)?.label).filter(Boolean),
  }));

  let results = {};
  try {
    const res = await fetch('/avatar-batch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ artists }),
      signal: AbortSignal.timeout(60000),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    results = data.results || {};
  } catch (e) {
    console.error('[Avatar] バッチ取得失敗:', e);
    toFetch.forEach(n => _avatarFetching.delete(n.id));
    if (_avatarFetchQueue.length) _scheduleAvatarQueue();
    return;
  }

  for (const node of toFetch) {
    _avatarFetching.delete(node.id);
    const result = results[node.label];
    if (!result || !result.imageUrl) {
      console.warn(`[Avatar] ${node.label}: 取得失敗 → 青背景のまま`);
      continue;
    }
    const proxyUrl = `/avatar-img/${btoa(result.imageUrl)}`;
    node.avatar = proxyUrl;
    cache[node.label] = proxyUrl;
    console.log(`[Avatar] ${node.label}: 完了`);
    applyAvatarToDOM(node);
  }
  saveAvatarCache(cache);

  // キューに残りがあれば続きを処理
  if (_avatarFetchQueue.length) _scheduleAvatarQueue();
}

function _scheduleAvatarQueue() {
  if (_avatarQueueTimer) return;
  _avatarQueueTimer = setTimeout(_processAvatarQueue, 80);
}

// SVG の foreignObject は画面スクロールでも位置が変わるため
// canvas の transform 変化後に再チェックする仕組みも持つ
function setupAvatarObserver() {
  // 既存のオブザーバーを破棄
  if (_avatarObserver) { _avatarObserver.disconnect(); _avatarObserver = null; }
  _avatarFetchQueue.length = 0;

  const cache = loadAvatarCache();

  // artist ノードのカード要素を全取得して監視開始
  const targets = AN.filter(n => n.type === 'artist' && !n.avatar);
  if (!targets.length) { console.log('[Avatar] 取得対象なし'); return; }
  console.log(`[Avatar] ${targets.length}件を監視開始`);

  // パルスを即時適用（ロード待ち状態を視覚化）
  for (const node of targets) {
    if (cache[node.label]) {
      // キャッシュあり → パルス不要、即反映
      node.avatar = cache[node.label];
      applyAvatarToDOM(node);
    } else {
      applyAvatarLoading(node);
    }
  }

  const uncached = targets.filter(n => !n.avatar);
  if (!uncached.length) { console.log('[Avatar] 全キャッシュヒット'); return; }

  _avatarObserver = new IntersectionObserver((entries) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const id = entry.target.dataset.id;
      const node = AN.find(n => n.id === id);
      if (!node || node.avatar || _avatarFetching.has(id)) continue;
      // 既にキューに入っていなければ追加
      if (!_avatarFetchQueue.find(n => n.id === id)) {
        _avatarFetchQueue.push(node);
        _scheduleAvatarQueue();
      }
      // 監視解除（一度キューに入れたら不要）
      _avatarObserver.unobserve(entry.target);
    }
  }, {
    root: null,           // ビューポート基準
    rootMargin: '60px',   // 60px 手前から先読み
    threshold: 0,
  });

  // 現在 DOM にあるカードを監視登録
  for (const node of uncached) {
    const cardEl = document.querySelector(`.pnode-card[data-id="${node.id}"]`);
    if (cardEl) _avatarObserver.observe(cardEl);
  }
}

// draw() が呼ばれるたびに新しい DOM を再監視するためのエントリポイント
function fetchArtistAvatars() {
  // rAF 後に DOM が確定してから監視を開始
  requestAnimationFrame(() => setupAvatarObserver());
}
/* ═══════════════════════════════════════════
   REFRESH / INIT
═══════════════════════════════════════════ */
function refresh() {
  const { nodes, links } = filteredData();
  selId = null; hovId = null;
  document.getElementById('info-panel').classList.remove('visible');
  draw(nodes, links);
}

function showGraphOverlay() {
  const el = document.getElementById('graph-loading-overlay');
  el.classList.remove('fadeout');
  el.classList.add('visible');
}

function hideGraphOverlay(delayMs = 2000) {
  const el = document.getElementById('graph-loading-overlay');
  setTimeout(() => {
    el.classList.add('fadeout');
    el.addEventListener('transitionend', () => {
      el.classList.remove('visible', 'fadeout');
    }, { once: true });
  }, delayMs);
}

function init(rows) {
  const data = buildGraph(rows);
  AN = data.nodes; AL = data.links;

  // キャッシュから ytId が既知のアーティストを事前解決
  // （ytId は前回の fetch 後に node に保存されていないため、
  //   キャッシュのキーを全走査してアーティスト名で照合することはせず、
  //   fetchArtistAvatars() 内で ytId 取得後にキャッシュ保存する設計のまま進む）

  hideGraphOverlay(2000);
  loadHiddenState();
  makeFilter();
  refresh();
  updateHiddenUI();
  fetchArtistAvatars();
}

/* ═══════════════════════════════════════════
   HIDDEN STATE PERSISTENCE
═══════════════════════════════════════════ */
function saveHiddenState() {
  const labels = [...hiddenIds].map(id => AN.find(n => n.id === id)?.label).filter(Boolean);
  localStorage.setItem(HIDDEN_KEY, JSON.stringify(labels));
}

function loadHiddenState() {
  try {
    const saved = localStorage.getItem(HIDDEN_KEY);
    if (!saved) return;
    const labels = new Set(JSON.parse(saved));
    hiddenIds.clear();
    AN.forEach(n => { if (labels.has(n.label)) hiddenIds.add(n.id); });
  } catch (e) { /* ignore */ }
}

/* ═══════════════════════════════════════════
   HIDDEN PANEL UI
═══════════════════════════════════════════ */
function updateHiddenUI() {
  document.getElementById('hp-count').textContent = `(${hiddenIds.size})`;
  const list = document.getElementById('hp-list');
  if (!list) return;
  list.innerHTML = '';
  [...hiddenIds].forEach(id => {
    const node = AN.find(n => n.id === id);
    if (!node) return;
    const typeLabel = node.type === 'director' ? 'CREATOR' : node.type === 'artist' ? 'ART' : 'WORK';
    const row = document.createElement('div');
    row.className = 'hp-item';
    row.innerHTML = `
      <span class="hp-item-type">${typeLabel}</span>
      <span class="hp-item-label" title="${esc(node.label)}">${esc(node.label)}</span>
      <button class="hp-restore" data-id="${esc(id)}" title="復元">↩</button>`;
    row.querySelector('.hp-restore').addEventListener('click', () => {
      hiddenIds.delete(id); updateHiddenUI(); refresh();
      if (hiddenIds.size === 0) document.getElementById('hidden-panel').classList.remove('visible');
    });
    list.appendChild(row);
  });
  saveHiddenState();
}

/* ═══════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════ */
let ctxTarget = null;
const ctxMenu = document.getElementById('ctx-menu');

function showCtx(e, d) {
  e.preventDefault(); e.stopPropagation();
  ctxTarget = d;
  document.getElementById('ctx-open').style.display = (d.type === 'work' && d.url) ? 'flex' : 'none';
  ctxMenu.style.display = 'block';
  ctxMenu.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  ctxMenu.style.top  = Math.min(e.clientY, window.innerHeight - 150) + 'px';
}
function hideCtx() { ctxMenu.style.display = 'none'; ctxTarget = null; }

document.addEventListener('click', hideCtx);
document.addEventListener('contextmenu', hideCtx);
ctxMenu.addEventListener('click', e => e.stopPropagation());

document.getElementById('ctx-hide').addEventListener('click', () => {
  if (!ctxTarget) return;
  hiddenIds.add(ctxTarget.id); updateHiddenUI(); refresh(); hideCtx();
});
document.getElementById('ctx-hide-connected').addEventListener('click', () => {
  if (!ctxTarget) return;
  hiddenIds.add(ctxTarget.id);
  AL.forEach(l => { const s = lid(l.source), t = lid(l.target); if (s === ctxTarget.id) hiddenIds.add(t); if (t === ctxTarget.id) hiddenIds.add(s); });
  updateHiddenUI(); refresh(); hideCtx();
});
document.getElementById('ctx-open').addEventListener('click', () => {
  if (ctxTarget?.url) window.open(ctxTarget.url, '_blank'); hideCtx();
});

/* ═══════════════════════════════════════════
   FILTER MODAL
═══════════════════════════════════════════ */
let fmCurrentTab = 'work';

function openFilterModal()  { document.getElementById('filter-modal').classList.add('visible'); document.getElementById('fm-search').value = ''; renderFmList(); }
function closeFilterModal() { document.getElementById('filter-modal').classList.remove('visible'); refresh(); }

function renderFmList() {
  const tab = fmCurrentTab;
  const q = document.getElementById('fm-search').value.trim().toLowerCase();
  const list = document.getElementById('fm-list');
  list.innerHTML = '';

  let nodes = AN.filter(n => n.type === tab);
  if (tab !== 'work') nodes = nodes.filter(n => hiddenIds.has(n.id));
  if (q) nodes = nodes.filter(n => n.label.toLowerCase().includes(q));
  nodes.sort((a, b) => a.label.localeCompare(b.label, 'ja'));

  if (nodes.length === 0 && tab !== 'work') {
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:24px 12px;text-align:center;color:var(--text-dim);font-size:13px';
    empty.textContent = '非表示のノードはありません';
    list.appendChild(empty);
    document.getElementById('fm-count').textContent = `${AN.filter(n => n.type===tab).length}件すべて表示中`;
    return;
  }

  nodes.forEach(node => {
    const isVisible = !hiddenIds.has(node.id);
    const subText = tab === 'work' ? (node.cats || []).join(', ') : `${(node.works||[]).length} 作品`;
    const item = document.createElement('div');
    item.className = 'fm-item';
    item.innerHTML = `
      <div class="fm-item-label" title="${esc(node.label)}">${esc(node.label)}</div>
      ${subText ? `<div class="fm-item-sub">${esc(subText)}</div>` : ''}
      <button class="fm-toggle ${isVisible ? 'on' : ''}" data-id="${esc(node.id)}" title="${isVisible ? '非表示にする' : '表示する'}"></button>`;
    item.querySelector('.fm-toggle').addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      if (hiddenIds.has(id)) { hiddenIds.delete(id); this.classList.add('on'); }
      else { hiddenIds.add(id); this.classList.remove('on'); }
      updateHiddenUI();
      if (tab !== 'work') renderFmList();
    });
    list.appendChild(item);
  });

  const total = AN.filter(n => n.type === tab).length;
  const hidden = AN.filter(n => n.type === tab && hiddenIds.has(n.id)).length;
  document.getElementById('fm-count').textContent = hidden > 0 ? `${hidden}件非表示` : `${total}件すべて表示中`;
}

document.getElementById('filter-modal-btn').addEventListener('click', openFilterModal);
document.getElementById('fm-close').addEventListener('click', closeFilterModal);
document.getElementById('fm-done').addEventListener('click', closeFilterModal);
document.getElementById('filter-modal').addEventListener('click', e => { if (e.target === document.getElementById('filter-modal')) closeFilterModal(); });
['work', 'director', 'artist'].forEach(tab => {
  document.getElementById(`fm-tab-${tab}`).addEventListener('click', () => {
    fmCurrentTab = tab;
    document.querySelectorAll('.fm-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`fm-tab-${tab}`).classList.add('active');
    renderFmList();
  });
});
document.getElementById('fm-search').addEventListener('input', renderFmList);

   TOPBAR EVENTS
═══════════════════════════════════════════ */
document.getElementById('search-box').addEventListener('input', e => { sq = e.target.value.trim(); refresh(); });

document.getElementById('depth-tog').addEventListener('click', () => {

document.getElementById('theme-btn').addEventListener('click', () => {

document.getElementById('hidden-btn').addEventListener('click', () => {

});

document.getElementById('hp-restore-all').addEventListener('click', () => {

document.getElementById('fi0').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader(); r.onload = ev => init(parseCSV(ev.target.result)); r.readAsText(f, 'UTF-8');
});

window.addEventListener('resize', () => { if (AN.length) { const { nodes, links } = filteredData(); draw(nodes, links); } });

/* ═══════════════════════════════════════════
   NOTION SYNC
═══════════════════════════════════════════ */
// トークンはサーバー側 (server.js) で管理。ブラウザには持たない。

function showToast(msg, type = 'ok', duration = 3200) {
  const el = document.getElementById('notion-toast');
  el.textContent = msg; el.className = 'show ' + type; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = 'none'; el.className = ''; }, duration);
}

async function fetchFromNotionAPI() {
  showGraphOverlay();
  const btn = document.getElementById('notion-sync-btn');
  const label = btn.querySelector('span:last-child');
  btn.classList.add('loading'); label.textContent = '取得中…';
  try {
    const r = await fetch('/notion-data', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}), signal: AbortSignal.timeout(60000),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    if (!data.results?.length) throw new Error('データが0件です');
    ALL_CREATORS = data.creators || [];
    // creators / artists フィールドがあればメタ情報を先に読み込む
    const allPersons = [...ALL_CREATORS, ...(data.artists ?? [])];

    if (allPersons.length) loadCreatorMeta(allPersons);
    init(data.results);
    localStorage.setItem('notion_last_sync', new Date().toLocaleString('ja-JP'));
  } catch (e) {
    console.error('[Notion]', e);
    const msg = (e.message.includes('Failed to fetch') || e.message.includes('NetworkError'))
      ? 'CORSエラー: server.js をご利用ください' : `✗ ${e.message}`;
    showToast(msg, 'err', 6000);
    hideGraphOverlay(0);
  } finally {
    btn.classList.remove('loading'); label.textContent = '更新';
  }
}

document.getElementById('notion-sync-btn').addEventListener('click', fetchFromNotionAPI);
window.addEventListener('load', fetchFromNotionAPI);
